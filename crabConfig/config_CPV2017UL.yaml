#         Data -> branches/branch_CPV_Run2_Data.txt
#         MC   -> branches/branch_CPV_Run2_MC.txt
#     The single-field schema holds only ONE. Wire per-type later (split into
#     _Data/_MC configs, or extend the schema to pick by tier). Set to the MC
#     list by default since the categorizer is MC-only.
#   - splitting / units_per_job : temporary
# NanoAODv9 now; migrate to NanoAODv15 later (campaign strings will change).
# ==========================================================================
