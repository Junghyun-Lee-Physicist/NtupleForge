#         from the user-provided 2017UL lists (NanoAODv9). Paths flagged with a
#         NOTE comment had a transcription artifact normalized — verify on DAS.
# PLACEHOLDER (analyst to set): everything in `common:` below.
#   - jobID / output_base       : temporary tags
#   - analysis_module           : -> modules/topCPVCategorizer.py (TopCPV port)
