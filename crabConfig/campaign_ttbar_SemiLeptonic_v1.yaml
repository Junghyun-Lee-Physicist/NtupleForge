# Campaign Configuration
# ===========================
# This file defines common settings and the list of datasets to process.

common:
  # Working directory for CRAB logs
  jobID: "campaign_ttbar_SemiLeptonic_v1"
  
  # Site configuration
  site: "T3_KR_KNU"
  
  # Path where output files will be stored: /store/user/<username>/<output_base>/...
  # output_base: "" # Leave empty for default
  
  # Processing Configuration
  # ---------------------------------------------------------------------------
  # NOTE: The values below are passed as arguments to 'scripts/run_postproc.py'.
  # 'module': Passed to '-I' or '--imports'. Use format 'package.module:LIST_NAME'.
  # 'branch_selection': Passed to '-b'. Must point to a valid text file.
  # ---------------------------------------------------------------------------
  module: "modules.jets_met:MODULES"
  branch_selection: "branches/branch_keep_and_drop.txt"
  
  # Job Splitting (Auto-merge based on event count)
  splitting: "EventAwareLumiBased"
  units_per_job: 50000  # Target: ~50k events per output file
  
  # Max events for testing (remove or comment out for full run)
  # max_events: 1000

datasets:
  # Format: "Short_Name": "DAS_Dataset_Path"
  
  TTbar_SemiLep: "/TTToSemiLeptonic_TuneCP5_13TeV-powheg-pythia8/RunIISummer20UL17NanoAODv9-106X_mc2017_realistic_v9-v1/NANOAODSIM"
  
